name: Deploy

on:
    push:
        branches: [release]

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repo
              uses: actions/checkout@v3

            - name: Create .env file
              run: |
                  echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
                  echo "DB_HOST=localhost" >> .env
                  echo "VAPID_PUBLIC=${{ secrets.VAPID_PUBLIC }}" >> .env
                  echo "VAPID_PRIVATE=${{ secrets.VAPID_PRIVATE }}" >> .env
                  echo "METERED_DOMAIN=${{ secrets.METERED_DOMAIN }}" >> .env
                  echo "METERED_SECRET=${{ secrets.METERED_SECRET }}" >> .env
                  echo "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" >> .env

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lowercase repo path
              id: string
              run: |
                  echo "repo_lc=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ghcr.io/${{ steps.string.outputs.repo_lc }}:latest

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

            - name: Load and run Docker on server
              run: |
                  ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
                    echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                    docker pull ghcr.io/${{ steps.string.outputs.repo_lc }}:latest
                    docker stop min-container || true
                    docker rm min-container || true
                    mkdir -p ~/min/uploads || true
                    mkdir -p ~/min/logs || true
                    rm -rf ~/min/temp || true
                    mkdir -p ~/min/temp || true
                    docker run -d -p 5000:5000 --name min-container --restart unless-stopped --network host -v ~/min/uploads:/app/uploads -v ~/min/logs:/app/logs ghcr.io/${{ steps.string.outputs.repo_lc }}:latest
                    docker rmi $(docker images -f "dangling=true" -q) || true
                  EOF
